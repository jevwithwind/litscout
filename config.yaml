# =============================================================================
# litscout — Pipeline Configuration
# =============================================================================
# API keys and credentials belong in .env, not here.

# --- LLM settings (env var names, not actual keys) ---
api:
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
  model_env: LLM_MODEL
  max_tokens: 16384
  temperature: 0.3
  max_concurrent_requests: 3

# --- Academic search settings ---
search:
  sources:
    - semantic_scholar
    - openalex
  queries_per_iteration: 5          # How many search queries the LLM generates per round
  results_per_query: 20             # Max results fetched per search query
  year_range: 5                     # Only consider papers from the last N years
  open_access_only: false           # If true, skip papers without open-access PDFs
  semantic_scholar:
    api_key_env: S2_API_KEY
  openalex:
    email_env: OPENALEX_EMAIL
  elsevier:
    api_key_env: ELSEVIER_API_KEY
    inst_token_env: ELSEVIER_INST_TOKEN
    enabled: true                   # Set false to disable Elsevier fallback entirely

# --- Download settings ---
download:
  concurrency: 5                    # Max simultaneous PDF downloads
  timeout: 60                       # Seconds before a download times out
  max_pdf_size_mb: 50               # Skip PDFs larger than this

# --- Screening settings ---
screening:
  batch_size: 10                    # Papers per LLM screening call
  max_tokens_per_batch: 200000      # Token budget per batch (safety ceiling)

# --- Sufficiency / stopping settings ---
sufficiency:
  target_kept_papers: 20            # Pause when this many papers are kept (0 = no target)
  min_high_relevance: 5             # Minimum high-relevance papers for sufficiency
  min_medium_relevance: 8           # Minimum medium-relevance papers for sufficiency
  max_iterations: 0                 # 0 = unlimited, runs until manually stopped
  auto_stop: false                  # true = stop automatically; false = pause and ask user

# --- File paths ---
paths:
  prompt_file: prompts/research.md
  query_gen_prompt: prompts/query_gen.md
  screening_prompt: prompts/screening.md
  sufficiency_prompt: prompts/sufficiency.md
  output_dir: output
  kept_papers_dir: output/kept_papers
  reports_dir: output/reports
  manifest_file: output/manifest.json
  temp_dir: temp
